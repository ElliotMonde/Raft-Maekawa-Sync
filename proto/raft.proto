syntax = "proto3";

package raft;

option go_package = "raft-maekawa/proto/raftpb;raftpb";

// payload in raft log
message LogEntry {
  int64 index = 1; // position in the log (1-indexed)
  int64 term  = 2; // leader term when this entry was created
  bytes data  = 3; // JSON-encoded models.TaskEvent
}

// req vote for leader election
message RequestVoteReq {
  int64 term           = 1; // candidate's current term
  int32 candidate_id   = 2; // who is asking for the vote
  int64 last_log_index = 3; // index of candidate's last log entry
  int64 last_log_term  = 4; // term of candidate's last log entry
}

// resp to vote in leader election
message RequestVoteResp {
  int64 term         = 1; // voter's current term (so candidate can update itself)
  bool  vote_granted = 2;
}

// sent by the Leader to replicate log entries and heartbeat
message AppendEntriesReq {
  int64          term           = 1; // leader's current term
  int32          leader_id      = 2; // so followers can redirect clients
  int64          prev_log_index = 3; // index of log entry immediately before new ones
  int64          prev_log_term  = 4; // term of prev_log_index entry
  repeated LogEntry entries     = 5; // empty for heartbeat
  int64          leader_commit  = 6; // leader's commitIndex
}

// follower's reply to an AppendEntriesReq
message AppendEntriesResp {
  int64 term    = 1; // follower's current term
  bool  success = 2; // true if follower matched prev_log_index/term
}


service RaftService {
  rpc RequestVote(RequestVoteReq)     returns (RequestVoteResp);
  rpc AppendEntries(AppendEntriesReq) returns (AppendEntriesResp);
}
