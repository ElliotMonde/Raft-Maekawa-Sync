syntax = "proto3";

package raft;

option go_package = "raft-maekawa-sync/api/raft";

service Raft {
    // Candidate nodes call this to ask peers for their vote
    rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse);

    // Leaders call this to send heartbeats or replicate log entries
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);

    //External Task Interface
    rpc SubmitTask (SubmitTaskRequest) returns (SubmitTaskResponse);

    // Get current lists of active nodes and pending tasks
    rpc GetState (GetStateRequest) returns (GetStateResponse);
}

message RequestVoteRequest {
    int32 term = 1;
    int32 candiate_id = 2;
    int32 last_log_index = 3;
    int32 last_log_term = 4;
}

message RequestVoteResponse {
    int32 term = 1;
    bool vote_granted = 2;
}

message AppendEntriesRequest {
    int32 term = 1;
    int32 leader_id = 2;
    int32 prev_log_index = 3;
    int32 prev_log_term = 4;

    // The actual data/commands to be stored (empty for heartbeat)
    repeated LogEntry entries = 5;
    int32 leader_commit = 6;
}

message AppendEntriesResponse {
    int32 term = 1;
    bool success = 2;
}

message LogEntry {
    int32 term = 1;
    int32 index = 2;
    string command = 3;
}

enum TaskStatus {
    PENDING = 0;
    IN_PROGRESS = 1;
    COMPLETED = 2;
    FAILED = 3;
}

message Task {
    string task_id = 1;
    string data = 2;
    TaskStatus status = 3;
    int32 assigned_to = 4; // Maekawa Node ID handling this task
}

message SubmitTaskRequest {
    string data = 1;
}

message SubmitTaskResponse {
    bool success = 1;
    int32 leader_id = 2;
    string task_id = 3;
}

message GetStateRequest {}

message GetStateResponse {
    repeated int32 active_nodes = 1; // For Maekawa Regridding
    repeated Task tasks = 2; // The Task Queue
}