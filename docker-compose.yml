services:
  # ──── RAFT CONSENSUS LAYER (3 nodes) ────
  raft-node1:
    build:
      context: .
      dockerfile: Dockerfile
      target: raft
    container_name: raft-maekawa-raft-node1
    entrypoint: ["/app/bin/raft"]
    command:
      - --id=1
      - --addr=raft-node1:5001
      - --peers=2=raft-node2:5002,3=raft-node3:5003
      - --workers=4,5,6
      - --data-dir=/data
    ports:
      - "5001:5001"
    volumes:
      - raft-node1-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z raft-node1 5001"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  raft-node2:
    build:
      context: .
      dockerfile: Dockerfile
      target: raft
    container_name: raft-maekawa-raft-node2
    entrypoint: ["/app/bin/raft"]
    command:
      - --id=2
      - --addr=raft-node2:5002
      - --peers=1=raft-node1:5001,3=raft-node3:5003
      - --workers=4,5,6
      - --data-dir=/data
    ports:
      - "5002:5002"
    volumes:
      - raft-node2-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z raft-node2 5002"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  raft-node3:
    build:
      context: .
      dockerfile: Dockerfile
      target: raft
    container_name: raft-maekawa-raft-node3
    entrypoint: ["/app/bin/raft"]
    command:
      - --id=3
      - --addr=raft-node3:5003
      - --peers=1=raft-node1:5001,2=raft-node2:5002
      - --workers=4,5,6
      - --data-dir=/data
    ports:
      - "5003:5003"
    volumes:
      - raft-node3-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z raft-node3 5003"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ──── MAEKAWA WORKERS (3 nodes) ────
  worker1:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: raft-maekawa-worker1
    entrypoint: ["/app/bin/worker"]
    command:
      - --id=4
      - --addr=worker1:6001
      - --peers=5=worker2:6002,6=worker3:6003
      - --raft=1=raft-node1:5001,2=raft-node2:5002,3=raft-node3:5003
      - --data-dir=/data
      - --dashboard=dashboard:8080
    ports:
      - "6001:6001"
    volumes:
      - worker1-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z worker1 6001"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  worker2:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: raft-maekawa-worker2
    entrypoint: ["/app/bin/worker"]
    command:
      - --id=5
      - --addr=worker2:6002
      - --peers=4=worker1:6001,6=worker3:6003
      - --raft=1=raft-node1:5001,2=raft-node2:5002,3=raft-node3:5003
      - --data-dir=/data
      - --dashboard=dashboard:8080
    ports:
      - "6002:6002"
    volumes:
      - worker2-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z worker2 6002"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  worker3:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: raft-maekawa-worker3
    entrypoint: ["/app/bin/worker"]
    command:
      - --id=6
      - --addr=worker3:6003
      - --peers=4=worker1:6001,5=worker2:6002
      - --raft=1=raft-node1:5001,2=raft-node2:5002,3=raft-node3:5003
      - --data-dir=/data
      - --dashboard=dashboard:8080
    ports:
      - "6003:6003"
    volumes:
      - worker3-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z worker3 6003"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: raft-maekawa-dashboard
    entrypoint: ["/app/bin/dashboard"]
    command:
      - --addr=:8080
      - --nodes=1=raft-node1:5001,2=raft-node2:5002,3=raft-node3:5003,4=worker1:6001,5=worker2:6002,6=worker3:6003
      - --docker-compose-file=/app/docker-compose.yml
      - --docker-project-name=raft-maekawa-sync
      - --web-dir=/app/web/dist
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - raft-node1
      - raft-node2
      - raft-node3
      - worker1
      - worker2
      - worker3

  requester:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    entrypoint: ["/app/bin/requester"]
    depends_on:
      - worker1
      - worker2
      - worker3

volumes:
  raft-node1-data:
  raft-node2-data:
  raft-node3-data:
  worker1-data:
  worker2-data:
  worker3-data:
